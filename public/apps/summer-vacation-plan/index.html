<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>☀️ 나의 알찬 여름방학 계획서 🏖️</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
        }
        .title-font {
            font-family: 'Fredoka One', 'Noto Sans KR', sans-serif;
        }
        /* Scrollbar custom */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 9999px;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 9999px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        .animate-scaleUp {
            animation: scaleUp 0.15s ease-out forwards;
        }
        @keyframes scaleUp {
            from { transform: scale(0.97); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-amber-50 via-sky-50 to-blue-100 min-h-screen text-slate-800">

<div id="root"></div>

<!-- React, ReactDOM, and Babel -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useMemo, useRef } = React;

const WEEKDAYS = ['월', '화', '수', '목', '금', '토', '일'];

// 16 Soft and vibrant pastel colors
const COLOR_PALETTE = [
    '#ff8a8a', '#ffd1a4', '#fff5a5', '#bbf7be', '#bfdbfe', '#c7d2fe', '#fbcfe8', '#99f6e4',
    '#f87171', '#fb923c', '#fde047', '#a3e635', '#4ade80', '#2dd4bf', '#38bdf8', '#818cf8'
];

const EMOJI_LIST = [
    '🛌', '📚', '✍️', '🏃', '🥪', '🎮', '🏊', '🏀', '🎨', '🧩',
    '🧹', '🍱', '🦖', '🚲', '🎹', '🏕️', '✈️', '📺', '💤', '🍉',
    '☀️', '🌈', '🍦', '🏖️', '🎒', '🔋', '👨‍👩‍👧‍👦', '🐾', '⏰', '🍽️'
];

// Helper to convert minutes (0 ~ 1440) to 12-hour Korean format
const formatKoreanTime = (mins) => {
    if (mins === 1440) return '오후 12:00 (자정)';
    const hour24 = Math.floor(mins / 60);
    const m = mins % 60;
    const period = hour24 >= 12 ? '오후' : '오전';
    const hour12 = hour24 % 12 === 0 ? 12 : hour24 % 12;
    const padMin = String(m).padStart(2, '0');
    return `${period} ${hour12}:${padMin}`;
};

function App() {
    // Tab State: 'wheel' | 'calendar'
    const [activeTab, setActiveTab] = useState('wheel');
    const [studentName, setStudentName] = useState('홍길동');
    const [selectedDay, setSelectedDay] = useState('월');
    const [toastMessage, setToastMessage] = useState('');
    const [confirmModal, setConfirmModal] = useState({ show: false, title: '', message: '', onConfirm: null });

    // Custom plans added by the user. Empty list initially to fulfill "start completely empty" requirement.
    const [customPlans, setCustomPlans] = useState(() => {
        const saved = localStorage.getItem('summer_planner_customs_v3');
        if (saved) {
            try { return JSON.parse(saved); } catch (e) {}
        }
        const initial = {};
        WEEKDAYS.forEach(day => {
            initial[day] = []; // Empty start as requested
        });
        return initial;
    });

    // Calendar Specific State (2026 ~ 2030)
    const [currentYear, setCurrentYear] = useState(2026);
    const [currentMonth, setCurrentMonth] = useState(7); // Summer July
    const [calendarEvents, setCalendarEvents] = useState(() => {
        const saved = localStorage.getItem('summer_planner_calendar_events');
        if (saved) {
            try { return JSON.parse(saved); } catch (e) {}
        }
        return {}; // Format: { "2026-07-20": [ { id, title, color, emoji } ] }
    });
    const [showEventModal, setShowEventModal] = useState(false);
    const [selectedDateStr, setSelectedDateStr] = useState('');
    const [calendarEventTitle, setCalendarEventTitle] = useState('');
    const [calendarEventColor, setCalendarEventColor] = useState(COLOR_PALETTE[0]);
    const [calendarEventEmoji, setCalendarEventEmoji] = useState(EMOJI_LIST[1]);

    // Form inputs matching image_9284a9.png exactly
    const [startHour, setStartHour] = useState(9); // 9 AM
    const [startMin, setStartMin] = useState(0);
    const [endHour, setEndHour] = useState(10); // 10 AM
    const [endMin, setEndMin] = useState(0);
    const [planTitle, setPlanTitle] = useState('');
    const [selectedColor, setSelectedColor] = useState(COLOR_PALETTE[0]);
    const [selectedEmoji, setSelectedEmoji] = useState(EMOJI_LIST[0]);

    // Editing State (Clicking item from list triggers this)
    const [editingPlanId, setEditingPlanId] = useState(null);

    // Copy Day Modal state
    const [showCopyModal, setShowCopyModal] = useState(false);
    const [copyTargetDays, setCopyTargetDays] = useState([]);

    // Toast alert trigger
    const triggerToast = (msg) => {
        setToastMessage(msg);
        setTimeout(() => setToastMessage(''), 2500);
    };

    // Auto-save data
    useEffect(() => {
        localStorage.setItem('summer_planner_customs_v3', JSON.stringify(customPlans));
    }, [customPlans]);

    useEffect(() => {
        localStorage.setItem('summer_planner_calendar_events', JSON.stringify(calendarEvents));
    }, [calendarEvents]);

    const activeCustomPlans = useMemo(() => {
        return (customPlans[selectedDay] || []).sort((a, b) => a.start - b.start);
    }, [customPlans, selectedDay]);

    // Real-time plan preview segment dynamically loaded while user edits or writes in the panel.
    // Note: The text is kept empty so only the color sector shows on the wheel.
    const livePreviewPlan = useMemo(() => {
        const startTotalMins = startHour * 60 + startMin;
        const endTotalMins = endHour * 60 + endMin;
        if (startTotalMins >= endTotalMins) return null;
        return {
            id: 'live-preview-slice',
            start: startTotalMins,
            end: endTotalMins,
            title: '', // Removed "새 일과 미리보기 📝" to prevent overlaps as requested
            color: selectedColor,
            emoji: '', // No emoji to avoid overlap
            isPreview: true
        };
    }, [startHour, startMin, endHour, endMin, selectedColor]);

    // Generates a continuous 24-hour routine array. Gaps between custom plans are padded as "자유 시간"
    const fullTimeline = useMemo(() => {
        // Filter out the plan currently being edited so it doesn't double-render
        let basePlans = activeCustomPlans.filter(p => p.id !== editingPlanId);

        // If preview exists, we can inject it visually over base plans
        const sorted = [...basePlans];
        if (livePreviewPlan) {
            sorted.push(livePreviewPlan);
        }
        sorted.sort((a, b) => a.start - b.start);

        const timeline = [];
        let current = 0;

        sorted.forEach(p => {
            if (p.start > current) {
                timeline.push({
                    id: `free-${current}-${p.start}`,
                    start: current,
                    end: p.start,
                    title: '자유 시간',
                    color: '#e2e8f0', // Neutral light gray
                    emoji: '🏖️',
                    isFree: true
                });
            }
            timeline.push(p);
            current = p.end;
        });

        if (current < 1440) {
            timeline.push({
                id: `free-${current}-1440`,
                start: current,
                end: 1440,
                title: '자유 시간',
                color: '#e2e8f0',
                emoji: '🏖️',
                isFree: true
            });
        }

        return timeline;
    }, [activeCustomPlans, livePreviewPlan, editingPlanId]);

    // Live vacation scheduler health & balance evaluation algorithm
    // Now updated for children ideal sleep of 7 ~ 9 hours.
    const evaluation = useMemo(() => {
        if (activeCustomPlans.length === 0) {
            return {
                score: 0,
                rating: 'D',
                tagline: '아직 계획이 등록되지 않은 도화지 상태입니다! ✏️',
                colorClass: 'text-slate-500 bg-slate-100 ring-2 ring-slate-300',
                tips: [
                    '오른쪽 입력창에서 원하는 시작 시간과 종료 시간을 골라 첫 일과를 추가해 보세요!',
                    '방학은 자유시간도 소중하지만 규칙적인 습관이 더 알찬 하루를 만듭니다.'
                ]
            };
        }

        let sleepMins = 0;
        let studyMins = 0;
        let exerciseMins = 0;

        activeCustomPlans.forEach(p => {
            const t = p.title || '';
            const e = p.emoji || '';
            const duration = p.end - p.start;

            if (t.includes('수면') || t.includes('잠') || t.includes('취침') || e === '🛌' || e === '💤') {
                sleepMins += duration;
            } else if (t.includes('공부') || t.includes('학습') || t.includes('학원') || t.includes('독서') || t.includes('책') || e === '📚' || e === '✍️') {
                studyMins += duration;
            } else if (t.includes('운동') || t.includes('헬스') || t.includes('줄넘기') || t.includes('산책') || e === '🏃' || e === '🏊' || e === '🏀' || e === '🚲') {
                exerciseMins += duration;
            }
        });

        const sleepHrs = sleepMins / 60;
        const studyHrs = studyMins / 60;
        const exerciseHrs = exerciseMins / 60;

        let score = 100;
        const tips = [];

        // 1. Sleep Balance (Ideal: 7 ~ 9 hours)
        if (sleepHrs >= 7 && sleepHrs <= 9) {
            tips.push('🛌 아주 규칙적이고 건강한 수면 계획입니다! 키 성장에 큰 도움이 돼요.');
        } else if (sleepHrs === 0) {
            score -= 20;
            tips.push('🛌 수면 일정이 계획표에 빠져 있어요. 규칙적인 취침/기상 일정을 추가해 주세요!');
        } else if (sleepHrs < 7) {
            score -= 10;
            tips.push(`⚠️ 수면 시간이 조금 부족해요 (${sleepHrs.toFixed(1)}시간). 최소 7시간 이상 수면을 권장합니다.`);
        } else {
            score -= 10;
            tips.push(`💤 수면 시간이 너무 과도해요 (${sleepHrs.toFixed(1)}시간). 7~9시간이 성장기 어린이에게 가장 이상적입니다. 오전 기상 시간을 조금 더 일찍 배치해 볼까요?`);
        }

        // 2. Study Balance (Ideal: 1 ~ 4 hours)
        if (studyHrs >= 1 && studyHrs <= 4) {
            tips.push('📚 매일 꾸준한 학습이 계획되어 있네요! 방학 동안 실력이 훌쩍 자라날 거예요.');
        } else if (studyHrs === 0) {
            score -= 25;
            tips.push('⚠️ 하루 배움 일과가 비어있어요. 독서나 방학 숙제 시간을 단 1시간이라도 추가해 보길 권장해요.');
        } else if (studyHrs > 5) {
            score -= 10;
            tips.push(`🔥 공부 시간이 너무 많습니다 (${studyHrs.toFixed(1)}시간). 방학이니까 휴식과 놀이도 밸런스 있게 섞어주세요.`);
        }

        // 3. Physical Exercise (Ideal: 0.5 ~ 2.5 hours)
        if (exerciseHrs >= 0.5 && exerciseHrs <= 2.5) {
            tips.push('🏃 땀 흘리는 멋진 체력 단련 일정이 포함되었습니다. 기초 면역력이 쑥쑥!');
        } else if (exerciseHrs === 0) {
            score -= 15;
            tips.push('🚲 신체 활동 시간이 빠져 있어요. 하루 30분이라도 밖에서 가볍게 뛰노는 시간을 채워보세요.');
        }

        score = Math.max(15, Math.min(100, score));

        let rating = 'B';
        let tagline = '성실하게 계획을 잘 세우고 있어요!';
        let colorClass = 'text-indigo-600 bg-indigo-100 ring-2 ring-indigo-300';

        if (score >= 95) {
            rating = 'S';
            tagline = '✨ 갓생 마스터! 완벽한 비율의 훌륭한 여름방학 계획입니다.';
            colorClass = 'text-emerald-600 bg-emerald-100 ring-2 ring-emerald-300';
        } else if (score >= 85) {
            rating = 'A';
            tagline = '👍 매우 건강하고 조화로운 모범 일정입니다!';
            colorClass = 'text-sky-600 bg-sky-100 ring-2 ring-sky-300';
        } else if (score >= 70) {
            rating = 'B';
            tagline = '😊 실천하기 수월한 안정적인 방학 계획표입니다.';
            colorClass = 'text-indigo-600 bg-indigo-100 ring-2 ring-indigo-300';
        } else if (score >= 50) {
            rating = 'C';
            tagline = '🤔 균형 조절이 필요해 보여요. 수면/학습/운동 시간을 고루 채워봅시다.';
            colorClass = 'text-amber-600 bg-amber-100 ring-2 ring-amber-300';
        } else {
            rating = 'D';
            tagline = '⚠️ 건강한 방학을 위해 하루 일과를 골고루 다양하게 채워보세요!';
            colorClass = 'text-rose-600 bg-rose-100 ring-2 ring-rose-300';
        }

        return { score, rating, tagline, colorClass, tips };
    }, [activeCustomPlans]);

    const handleAddPlan = () => {
        const startTotalMins = startHour * 60 + startMin;
        const endTotalMins = endHour * 60 + endMin;

        if (startTotalMins >= endTotalMins) {
            triggerToast('⚠️ 종료 시간은 무조건 시작 시간보다 늦어야 합니다!');
            return;
        }

        // Overlapping detection (exclude self if in edit mode)
        const hasOverlap = activeCustomPlans.some(p => {
            if (editingPlanId && p.id === editingPlanId) return false;
            return startTotalMins < p.end && endTotalMins > p.start;
        });

        if (hasOverlap) {
            triggerToast('⚠️ 선택한 시간대가 이미 등록한 다른 계획과 겹칩니다! 다른 시간대를 선택해 주세요.');
            return;
        }

        const cleanTitle = planTitle.trim() || '새로운 일과 🎈';

        if (editingPlanId) {
            // Edit existing plan
            setCustomPlans(prev => ({
                ...prev,
                [selectedDay]: prev[selectedDay].map(p => {
                    if (p.id === editingPlanId) {
                        return { ...p, start: startTotalMins, end: endTotalMins, title: cleanTitle, color: selectedColor, emoji: selectedEmoji };
                    }
                    return p;
                }).sort((a, b) => a.start - b.start)
            }));
            triggerToast(`✏️ [${cleanTitle}] 일정이 성공적으로 수정되었습니다!`);
            setEditingPlanId(null);
        } else {
            // Add new plan
            const newPlan = {
                id: `plan-${Date.now()}`,
                start: startTotalMins,
                end: endTotalMins,
                title: cleanTitle,
                color: selectedColor,
                emoji: selectedEmoji
            };

            setCustomPlans(prev => ({
                ...prev,
                [selectedDay]: [...(prev[selectedDay] || []), newPlan].sort((a, b) => a.start - b.start)
            }));
            triggerToast(`🎉 [${cleanTitle}] 일정이 성공적으로 추가되었습니다!`);
        }

        // Reset inputs
        setPlanTitle('');
    };

    // Load selected plan into edit panel
    const handleEditSelect = (item) => {
        setEditingPlanId(item.id);
        setPlanTitle(item.title);
        setSelectedEmoji(item.emoji);
        setSelectedColor(item.color);
        setStartHour(Math.floor(item.start / 60));
        setStartMin(item.start % 60);
        setEndHour(Math.floor(item.end / 60));
        setEndMin(item.end % 60);
        triggerToast(`✏️ [${item.title}] 일정을 편집하는 중입니다. 내용을 수정해 보세요!`);
    };

    // Cancel edit mode
    const handleCancelEdit = () => {
        setEditingPlanId(null);
        setPlanTitle('');
        triggerToast('❌ 편집이 취소되었습니다.');
    };

    // Remove single custom event
    const handleDeletePlan = (id) => {
        setConfirmModal({
            show: true,
            title: '일정 삭제 확인 🗑️',
            message: '선택하신 계획을 계획표에서 삭제하시겠습니까? 빈 공간은 자동으로 자유시간으로 채워집니다.',
            onConfirm: () => {
                setCustomPlans(prev => ({
                    ...prev,
                    [selectedDay]: (prev[selectedDay] || []).filter(p => p.id !== id)
                }));
                if (editingPlanId === id) {
                    setEditingPlanId(null);
                    setPlanTitle('');
                }
                triggerToast('🗑️ 일정이 성공적으로 제거되었습니다.');
            }
        });
    };

    // Copy entire day's routine to multiple target days
    const executeCopyPlan = () => {
        if (copyTargetDays.length === 0) {
            triggerToast("⚠️ 적용할 대상 요일을 한 개 이상 체크해 주세요!");
            return;
        }

        const planToCopy = JSON.parse(JSON.stringify(activeCustomPlans));
        
        setCustomPlans(prev => {
            const updated = { ...prev };
            copyTargetDays.forEach(day => {
                updated[day] = planToCopy.map((b, i) => ({
                    ...b,
                    id: `b${i}-${day}-${Date.now()}`
                }));
            });
            return updated;
        });

        setShowCopyModal(false);
        setCopyTargetDays([]);
        triggerToast(`🎉 [${selectedDay}요일] 계획표가 [${copyTargetDays.join(', ')}]요일로 덮어씌워졌습니다!`);
    };

    // Convert minutes into Wheel coordinate angles
    const minuteToRad = (mins) => {
        const deg = (mins / 1440) * 360 - 90;
        return (deg * Math.PI) / 180;
    };

    // Helper function to split text for SVG/Canvas rendering based on visual length
    const splitTextIntoLines = (text, maxLength = 6) => {
        if (!text) return [];
        const result = [];
        let index = 0;
        while (index < text.length) {
            result.push(text.substring(index, index + maxLength));
            index += maxLength;
        }
        return result;
    };

    const handleExportPNG = () => {
        const canvas = document.createElement('canvas');
        canvas.width = 2000;
        canvas.height = 2000;
        const ctx = canvas.getContext('2d');

        // Premium Background Gradient
        const grad = ctx.createLinearGradient(0, 0, 2000, 2000);
        grad.addColorStop(0, '#fffdf9');
        grad.addColorStop(0.5, '#f0f9ff');
        grad.addColorStop(1, '#bae6fd');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, 2000, 2000);

        // Frame
        ctx.lineWidth = 14;
        ctx.strokeStyle = '#0284c7';
        ctx.strokeRect(50, 50, 1900, 1900);

        // Header Title Box
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.roundRect(120, 100, 1760, 220, 40);
        ctx.fill();

        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = '#0369a1';
        ctx.font = '900 64px "Noto Sans KR", sans-serif';
        ctx.fillText(`☀️ ${studentName}의 알찬 여름방학 계획서 🏖️`, 1000, 175);

        ctx.fillStyle = '#f97316';
        ctx.font = 'bold 36px "Noto Sans KR", sans-serif';
        ctx.fillText(`[ ${selectedDay}요일 ] 일일 생활 계획표`, 1000, 260);

        // Circle coordinates
        const CX = 1000;
        const CY = 1050;
        const R_OUTER = 600;
        const R_INNER = 200;

        // Draw sectors
        fullTimeline.forEach(item => {
            const startAng = minuteToRad(item.start);
            const endAng = minuteToRad(item.end);

            ctx.fillStyle = item.color;
            ctx.beginPath();
            ctx.moveTo(CX, CY);
            ctx.arc(CX, CY, R_OUTER, startAng, endAng);
            ctx.closePath();
            ctx.fill();

            // Slices border
            ctx.lineWidth = item.isPreview ? 8 : 4;
            ctx.strokeStyle = item.isPreview ? '#f97316' : '#ffffff';
            ctx.stroke();
        });

        // Center Rim Circle
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(CX, CY, R_INNER, 0, Math.PI * 2);
        ctx.fill();
        ctx.lineWidth = 10;
        ctx.strokeStyle = '#0284c7';
        ctx.stroke();

        ctx.fillStyle = '#0284c7';
        ctx.font = '900 42px "Noto Sans KR", sans-serif';
        ctx.fillText("방학 생활", CX, CY - 10);
        ctx.fillStyle = '#f97316';
        ctx.font = '900 32px "Noto Sans KR", sans-serif';
        ctx.fillText(`${selectedDay}요일`, CX, CY + 40);

        // Hour Ticks (0 ~ 24)
        for (let h = 0; h < 24; h++) {
            const mins = h * 60;
            const angle = minuteToRad(mins);
            const cos = Math.cos(angle);
            const sin = Math.sin(angle);

            ctx.beginPath();
            ctx.moveTo(CX + cos * R_OUTER, CY + sin * R_OUTER);
            ctx.lineTo(CX + cos * (R_OUTER + 20), CY + sin * (R_OUTER + 20));
            ctx.lineWidth = 5;
            ctx.strokeStyle = '#0284c7';
            ctx.stroke();

            // Hour numbers printed clearly outside the rim
            const labelDist = R_OUTER + 55;
            ctx.fillStyle = '#0f172a';
            ctx.font = '900 32px "Noto Sans KR", sans-serif';
            ctx.fillText(h === 0 ? '24' : String(h), CX + cos * labelDist, CY + sin * labelDist);
        }

        // Draw text inside each sector with automatic wrapping & perfectly HORIZONTAL alignment
        fullTimeline.forEach((item, idx) => {
            if (item.isPreview) return; // Do not draw text/labels for preview slice to keep it completely empty as requested

            const startAng = minuteToRad(item.start);
            const endAng = minuteToRad(item.end);
            const midAng = (startAng + endAng) / 2;
            const durationMins = item.end - item.start;

            // Stagger radius calculation to prevent horizontal overlaps on thin slices
            const isStaggered = durationMins < 80;
            const labelRadius = isStaggered 
                ? (idx % 2 === 0 ? (R_OUTER + R_INNER) / 2 - 50 : (R_OUTER + R_INNER) / 2 + 50)
                : (R_OUTER + R_INNER) / 2;

            const textX = CX + Math.cos(midAng) * labelRadius;
            const textY = CY + Math.sin(midAng) * labelRadius;

            ctx.save();
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = '#ffffff';
            ctx.shadowBlur = 10;

            let fontSz = 32;
            let wrapLimit = 7;
            if (durationMins < 45) {
                fontSz = 22;
                wrapLimit = 4;
            } else if (durationMins < 90) {
                fontSz = 28;
                wrapLimit = 5;
            }

            ctx.font = `900 ${fontSz}px "Noto Sans KR", sans-serif`;
            ctx.fillStyle = '#0f172a';

            const fullText = `${item.emoji || '⏰'} ${item.title}`;

            if (durationMins < 35) {
                // Too small sector, just draw emoji centered
                ctx.fillText(item.emoji || '⏰', textX, textY);
            } else {
                // Apply word wrapping inside canvas sector
                const lines = splitTextIntoLines(item.title, wrapLimit);
                const firstLineText = `${item.emoji || '⏰'} ${lines[0] || ''}`;
                
                if (lines.length > 1) {
                    // Render multi-line horizontally aligned text safely
                    ctx.fillText(firstLineText, textX, textY - fontSz * 0.6);
                    for (let i = 1; i < Math.min(lines.length, 3); i++) {
                        ctx.fillText(lines[i], textX, textY + fontSz * (0.6 + (i - 1) * 1.1));
                    }
                } else {
                    ctx.fillText(fullText, textX, textY);
                }
            }

            ctx.restore();
        });

        // Bottom Score Board
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.roundRect(120, 1720, 1760, 180, 30);
        ctx.fill();

        ctx.fillStyle = '#0284c7';
        ctx.beginPath();
        ctx.roundRect(170, 1750, 320, 120, 20);
        ctx.fill();

        ctx.fillStyle = '#ffffff';
        ctx.font = '900 38px "Noto Sans KR", sans-serif';
        ctx.fillText(`일과점수: ${evaluation.score}점`, 330, 1810);

        ctx.fillStyle = '#1e293b';
        ctx.textAlign = 'left';
        ctx.font = '900 32px "Noto Sans KR", sans-serif';
        ctx.fillText(evaluation.tagline, 530, 1785);

        ctx.fillStyle = '#64748b';
        ctx.font = '600 24px "Noto Sans KR", sans-serif';
        const renderTips = evaluation.tips.slice(0, 2);
        renderTips.forEach((tip, idx) => {
            let chunk = tip;
            if (chunk.length > 50) chunk = chunk.substring(0, 50) + '...';
            ctx.fillText(chunk, 530, 1835 + idx * 35);
        });

        // Trigger safe file download
        const url = canvas.toDataURL('image/png');
        const link = document.createElement('a');
        link.href = url;
        link.download = `여름방학계획표_${studentName}_${selectedDay}요일.png`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        triggerToast("💾 계획표 이미지 다운로드가 성공적으로 시작되었습니다!");
    };

    const getDaysInMonth = (year, month) => {
        return new Date(year, month, 0).getDate();
    };

    const getFirstDayOffset = (year, month) => {
        // 0 = Sun, 1 = Mon ...
        const offset = new Date(year, month - 1, 1).getDay();
        return offset === 0 ? 6 : offset - 1; // Convert to Mon-Sun index (0 = Mon, 6 = Sun)
    };

    const handleDeleteCalendarEvent = (dateStr, id) => {
        setConfirmModal({

            }
        });
    };

    const handleExportCalendarPNG = () => {
        const canvas = document.createElement('canvas');
        canvas.width = 1600;
        canvas.height = 1400;
        const ctx = canvas.getContext('2d');

        // Draw Clean white/blue gradient bg
        const grad = ctx.createLinearGradient(0, 0, 1600, 1400);
        grad.addColorStop(0, '#ffffff');
        grad.addColorStop(1, '#e0f2fe');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, 1600, 1400);

        // Header Border Frame
        ctx.lineWidth = 10;
        ctx.strokeStyle = '#0284c7';
        ctx.strokeRect(40, 40, 1520, 1320);

        // Header Title Text
        ctx.fillStyle = '#0369a1';
        ctx.font = '900 56px "Noto Sans KR", sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(`📅 ${studentName}의 여름방학 달력 (${currentYear}년 ${currentMonth}월)`, 800, 120);

        // Grid Drawing Parameters
        const startX = 80;
        const startY = 220;
        const colW = 205;
        const rowH = 180;

        const weekdayLabels = ['월', '화', '수', '목', '금', '토', '일'];
        ctx.font = 'bold 28px "Noto Sans KR", sans-serif';
        ctx.fillStyle = '#334155';
        for (let i = 0; i < 7; i++) {
            ctx.fillText(weekdayLabels[i], startX + i * colW + colW / 2, startY - 30);
        }

        const totalDays = getDaysInMonth(currentYear, currentMonth);
        const offset = getFirstDayOffset(currentYear, currentMonth);

        let colIdx = offset;
        let rowIdx = 0;

        for (let d = 1; d <= totalDays; d++) {
            const rx = startX + colIdx * colW;
            const ry = startY + rowIdx * rowH;

            // Day Box
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.roundRect(rx, ry, colW - 10, rowH - 10, 15);
            ctx.fill();
            ctx.lineWidth = 2;
            ctx.strokeStyle = '#cbd5e1';
            ctx.stroke();

            // Day number text
            ctx.fillStyle = colIdx === 5 ? '#2563eb' : colIdx === 6 ? '#dc2626' : '#1e293b';
            ctx.font = '900 28px "Noto Sans KR", sans-serif';
            ctx.textAlign = 'left';
            ctx.fillText(String(d), rx + 15, ry + 40);

            // Fetch and draw events on that day
            const dateKey = `${currentYear}-${String(currentMonth).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            const events = calendarEvents[dateKey] || [];
            
            events.slice(0, 3).forEach((evt, eIdx) => {
                ctx.fillStyle = evt.color;
                ctx.beginPath();
                ctx.roundRect(rx + 10, ry + 60 + eIdx * 35, colW - 30, 30, 6);
                ctx.fill();

                ctx.fillStyle = '#0f172a';
                ctx.font = 'bold 16px "Noto Sans KR", sans-serif';
                ctx.textAlign = 'left';
                const dispText = `${evt.emoji} ${evt.title}`;
                const clippedText = dispText.length > 10 ? dispText.substring(0, 10) + '..' : dispText;
                ctx.fillText(clippedText, rx + 15, ry + 80 + eIdx * 35);
            });

            colIdx++;
            if (colIdx > 6) {
                colIdx = 0;
                rowIdx++;
            }
        }

        // Trigger safe file download
        const url = canvas.toDataURL('image/png');
        const link = document.createElement('a');
        link.href = url;
        link.download = `여름방학달력_${studentName}_${currentYear}년_${currentMonth}월.png`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        triggerToast("💾 달력 이미지 다운로드가 성공적으로 시작되었습니다!");
    };

            {/* Application Header banner (image_06713b.png match) */}

                    <div className="text-left">

                        </h1>
                        <p className="text-xs md:text-sm text-slate-500 font-medium">10분 단위 똑딱 선택과 실시간 갓생 점수 판정판이 탑재된 똑똑한 원판계획표</p>
                    </div>

                <div className="flex flex-wrap items-center gap-2 bg-sky-50/75 p-2 rounded-2xl">
                    <label className="text-sm font-bold text-sky-700 ml-2">계획표 주인공:</label>

                        className="bg-white text-center font-bold text-sky-900 border-2 border-sky-200 rounded-xl px-3 py-1.5 w-36 focus:outline-none focus:ring-2 focus:ring-sky-400"

                </div>

            {/* Premium Score Dashboard at the top (image_06713b.png visual style) */}
            <section className="mb-6 bg-white rounded-2xl p-4 shadow-md border border-sky-100 flex flex-col md:flex-row items-center justify-between gap-4">

                <div className="text-[11px] font-semibold text-slate-500 bg-slate-50 px-4 py-2.5 rounded-xl border border-slate-100 flex-1 max-w-2xl text-center md:text-left leading-relaxed">

                    </button>
                    <button
                        onClick={() => setActiveTab('calendar')}
                        className={`px-6 py-2.5 rounded-xl text-xs font-black transition-all flex items-center gap-2 ${

                                ? 'bg-white text-indigo-600 shadow-md'

                        <span>📅</span> 방학 특이사항 달력 (2026~2030)
                    </button>
                </div>
            </div>

            {/* TAB CONTENT: Circular daily wheel planner */}
            {activeTab === 'wheel' && (
                <div className="flex flex-col gap-8 animate-scaleUp">
                    
                    {}
                    {/* 1. TOP HUGE WHEEL CARD */}
                    <div className="bg-white p-6 md:p-8 rounded-3xl shadow-xl border border-slate-100 flex flex-col items-center w-full">
                        
                        {/* Day Selector & Copy controls inside the main block */}

                            <div className="flex items-center gap-2">
                                <span className="bg-sky-100 text-sky-700 text-xs px-2.5 py-1 rounded-md font-bold">선택 요일</span>

                                ) : (
                                    '원판 크기를 극대화하고 모든 글씨를 수평으로 고정하여 겹침 없이 선명하게 한눈에 읽을 수 있습니다.'
                                )}
                            </p>
                        </div>

                        {/* Interactive Circle Wheel Box - Scale significantly increased for clear presentation */}
                        <div className="relative w-full max-w-[650px] aspect-square flex items-center justify-center p-2 bg-slate-50/50 rounded-full border border-dashed border-slate-200 my-4">
                            <svg
                                viewBox="-120 -120 240 240"
                                className="w-full h-full select-none drop-shadow-md"
                            >
                                <circle cx="0" cy="0" r="102" fill="none" stroke="#e2e8f0" strokeWidth="1" />
                                
                                {fullTimeline.map((item) => {
                                    const startRad = minuteToRad(item.start);
                                    const endRad = minuteToRad(item.end);
                                    
                                    const x1 = Math.cos(startRad) * 100;
                                    const y1 = Math.sin(startRad) * 100;
                                    const x2 = Math.cos(endRad) * 100;
                                    const y2 = Math.sin(endRad) * 100;

                                    const largeArcFlag = item.end - item.start > 720 ? 1 : 0;

                                    return (
                                        <g key={item.id}>
                                            <path
                                                d={`M 0 0 L ${x1} ${y1} A 100 100 0 ${largeArcFlag} 1 ${x2} ${y2} Z`}
                                                fill={item.color}
                                                stroke={item.isPreview ? '#f97316' : '#ffffff'}
                                                strokeWidth={item.isPreview ? '1.5' : '1'}
                                                strokeDasharray={item.isPreview ? '3, 1.5' : 'none'}
                                                opacity={item.isPreview ? 0.8 : 0.95}
                                                className="transition-all duration-200 hover:opacity-100"
                                            />
                                        </g>
                                    );
                                })}

                                <circle cx="0" cy="0" r="32" fill="#ffffff" stroke="#0ea5e9" strokeWidth="2.5" />
                                <text x="0" y="0" textAnchor="middle" dominantBaseline="central" className="fill-sky-600 font-black text-[7.5px] tracking-tight pointer-events-none">
                                    방학생활
                                </text>

                                {/* Texts inside each slice - ALWAYS Horizontal and staggered to prevent overlapping! */}
                                {fullTimeline.map((item, idx) => {
                                    if (item.isPreview) return null; // Avoid drawing preview title/text to keep circle clean and prevent text overlapping

                                    const startRad = minuteToRad(item.start);
                                    const endRad = minuteToRad(item.end);
                                    const midRad = (startRad + endRad) / 2;
                                    const durationMins = item.end - item.start;

                                    // Stagger the radius (lx, ly) if adjacent chunks are thin, preventing horizontal collisions near each other!
                                    const isStaggered = durationMins < 80;
                                    const labelR = isStaggered 
                                        ? (idx % 2 === 0 ? 58 : 78) 
                                        : 68;

                                    const lx = Math.cos(midRad) * labelR;
                                    const ly = Math.sin(midRad) * labelR;

                                    let wrapLimit = 7;
                                    let shrinkText = false;
                                    
                                    if (durationMins < 40) {
                                        shrinkText = true;
                                        wrapLimit = 4;
                                    } else if (durationMins < 90) {
                                        wrapLimit = 5;
                                    }

                                    const textLines = splitTextIntoLines(item.title, wrapLimit);
                                    
                                    if (durationMins < 35) {
                                        // Sector is too tiny, show emoji only to prevent overflow
                                        return (
                                            <g key={`lbl-${item.id}`} pointerEvents="none">
                                                <text
                                                    x={lx}
                                                    y={ly}
                                                    textAnchor="middle"
                                                    dominantBaseline="central"
                                                    stroke="#ffffff"
                                                    strokeWidth="2"
                                                    paintOrder="stroke"
                                                    className="fill-slate-800 font-black text-[9px]"
                                                >
                                                    {item.emoji || '⏰'}
                                                </text>
                                            </g>
                                        );
                                    }

                                    return (
                                        <g key={`lbl-${item.id}`} pointerEvents="none">
                                            <text
                                                x={lx}
                                                y={ly}
                                                textAnchor="middle"
                                                dominantBaseline="central"
                                                stroke="#ffffff"
                                                strokeWidth="2.5"
                                                paintOrder="stroke"
                                                className={`fill-slate-800 font-black ${shrinkText ? 'text-[6px]' : 'text-[7.5px]'}`}
                                            >
                                                {textLines.length > 1 ? (
                                                    <React.Fragment>
                                                        {/* First line with emoji */}
                                                        <tspan x={lx} dy={`-${(textLines.length - 1) * 3.5}px`}>
                                                            {item.emoji} {textLines[0]}
                                                        </tspan>
                                                        {/* Remaining wrapped lines */}
                                                        {textLines.slice(1, 3).map((line, idx2) => (
                                                            <tspan key={idx2} x={lx} dy="8.5px">
                                                                {line}
                                                            </tspan>
                                                        ))}
                                                    </React.Fragment>
                                                ) : (
                                                    <tspan x={lx} y={ly}>
                                                        {item.emoji} {item.title}
                                                    </tspan>
                                                )}
                                            </text>
                                        </g>
                                    );
                                })}

                                {/* Ticks & Hour Labels */}
                                {[...Array(24).keys()].map(h => {
                                    const mins = h * 60;
                                    const rad = minuteToRad(mins);
                                    const cos = Math.cos(rad);
                                    const sin = Math.sin(rad);
                                    const isMajor = h % 3 === 0;

                                    return (
                                        <g key={`tick-${h}`}>
                                            <line
                                                x1={cos * 100}
                                                y1={sin * 100}
                                                x2={cos * (isMajor ? 104 : 102)}
                                                y2={sin * (isMajor ? 104 : 102)}

                                className="px-4.5 py-1.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg text-xs font-bold shadow-md transition"
                            >
                                계획 복사 실행
                            </button>
                        </div>
                    </div>
                </div>
            )}

        </div>
    );
}

const container = document.getElementById('root');
const root = ReactDOM.createRoot(container);
root.render(<App />);
</script>
</body>
</html>
