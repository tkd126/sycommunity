<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>마니또 뽑기</title>
    <style>
      :root {
        color: #172033;
        background: #f8fbff;
        font-family:
          "Noto Sans KR",
          "Apple SD Gothic Neo",
          "Malgun Gothic",
          system-ui,
          sans-serif;
        --blue: #4f7cff;
        --blue-dark: #2449b8;
        --mint: #35c4a5;
        --yellow: #ffe08a;
        --pink: #ff8ab3;
        --ink: #172033;
        --muted: #64748b;
        --line: #d8e1ef;
        --shadow: 0 18px 44px rgb(31 49 89 / 14%);
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-width: 320px;
        min-height: 100vh;
        margin: 0;
        background:
          radial-gradient(circle at 12% 12%, rgb(255 224 138 / 54%), transparent 24rem),
          radial-gradient(circle at 88% 10%, rgb(53 196 165 / 26%), transparent 22rem),
          linear-gradient(145deg, #f8fbff 0%, #fff8eb 100%);
      }

      button,
      textarea,
      select {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      .page {
        width: min(1120px, calc(100% - 32px));
        margin: 0 auto;
        padding: 36px 0 48px;
      }

      .hero {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 280px;
        gap: 22px;
        align-items: stretch;
        margin-bottom: 22px;
      }

      .title-panel,
      .status-panel,
      .input-panel,
      .result-panel {
        border: 1px solid rgb(255 255 255 / 86%);
        border-radius: 18px;
        background: rgb(255 255 255 / 82%);
        box-shadow: var(--shadow);
      }

      .title-panel {
        min-height: 230px;
        display: grid;
        align-content: center;
        padding: clamp(26px, 5vw, 52px);
        overflow: hidden;
        position: relative;
      }

      .title-panel::after {
        content: "";
        position: absolute;
        right: -78px;
        bottom: -98px;
        width: 270px;
        height: 270px;
        border-radius: 999px;
        background: linear-gradient(135deg, var(--yellow), var(--pink));
        opacity: 0.72;
      }

      .eyebrow {
        margin: 0 0 9px;
        color: var(--blue-dark);
        font-size: 0.88rem;
        font-weight: 900;
      }

      h1 {
        margin: 0;
        color: var(--ink);
        font-size: clamp(2.4rem, 6vw, 5rem);
        line-height: 1.05;
        letter-spacing: 0;
      }

      .lead {
        max-width: 620px;
        margin: 18px 0 0;
        color: #3b4a62;
        font-size: 1.08rem;
        font-weight: 700;
        word-break: keep-all;
      }

      .status-panel {
        display: grid;
        gap: 14px;
        align-content: center;
        padding: 24px;
      }

      .stat {
        display: grid;
        gap: 4px;
        padding: 16px;
        border-radius: 14px;
        background: #f5f8ff;
      }

      .stat span {
        color: var(--muted);
        font-size: 0.88rem;
        font-weight: 800;
      }

      .stat strong {
        color: var(--blue-dark);
        font-size: 2rem;
        line-height: 1;
      }

      .workspace {
        display: grid;
        grid-template-columns: minmax(300px, 0.92fr) minmax(0, 1.08fr);
        gap: 22px;
      }

      .input-panel,
      .result-panel {
        padding: 22px;
      }

      .panel-header {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: flex-start;
        margin-bottom: 14px;
      }

      h2 {
        margin: 0;
        font-size: 1.35rem;
      }

      .hint,
      .message {
        color: var(--muted);
        font-size: 0.94rem;
        word-break: keep-all;
      }

      .hint {
        margin: 4px 0 0;
      }

      textarea {
        width: 100%;
        min-height: 310px;
        resize: vertical;
        border: 1px solid var(--line);
        border-radius: 14px;
        outline: 0;
        padding: 16px;
        color: var(--ink);
        background: #ffffff;
        line-height: 1.7;
      }

      textarea:focus,
      select:focus {
        border-color: var(--blue);
        box-shadow: 0 0 0 4px rgb(79 124 255 / 16%);
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 14px;
      }

      .button {
        min-height: 44px;
        border: 0;
        border-radius: 12px;
        padding: 10px 15px;
        color: #ffffff;
        background: var(--blue);
        font-weight: 900;
      }

      .button:hover {
        background: var(--blue-dark);
      }

      .button.secondary {
        color: #244053;
        background: #e9f8f5;
      }

      .button.secondary:hover {
        background: #d8f3ec;
      }

      .button.ghost {
        color: var(--muted);
        background: #f2f5fa;
      }

      .result-tools {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        margin-bottom: 14px;
      }

      select {
        width: 100%;
        min-height: 44px;
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 9px 12px;
        color: var(--ink);
        background: #ffffff;
      }

      .secret-card {
        min-height: 168px;
        display: grid;
        place-items: center;
        margin-bottom: 14px;
        border: 2px dashed #b7c6dc;
        border-radius: 16px;
        background:
          linear-gradient(135deg, rgb(79 124 255 / 9%), rgb(255 224 138 / 22%)),
          #ffffff;
        text-align: center;
      }

      .gift-button {
        width: min(260px, 100%);
        border: 0;
        background: transparent;
        color: inherit;
        padding: 8px;
      }

      .gift-box {
        display: block;
        width: 118px;
        height: 104px;
        margin: 0 auto 14px;
        position: relative;
        transform-origin: center bottom;
        transition: transform 180ms ease;
      }

      .gift-button:not(:disabled):hover .gift-box,
      .gift-button:not(:disabled):focus-visible .gift-box {
        transform: translateY(-3px) rotate(-1deg);
      }

      .gift-lid,
      .gift-body {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        border-radius: 12px;
        background: linear-gradient(135deg, #ffe08a, #ffc857);
        box-shadow: 0 12px 24px rgb(185 121 32 / 16%);
      }

      .gift-lid {
        top: 16px;
        z-index: 2;
        width: 126px;
        height: 30px;
      }

      .gift-body {
        bottom: 0;
        z-index: 1;
        width: 104px;
        height: 70px;
      }

      .gift-lid::before,
      .gift-body::before {
        content: "";
        position: absolute;
        inset: 0 auto 0 50%;
        width: 20px;
        transform: translateX(-50%);
        background: #ff7d9c;
      }

      .gift-bow {
        position: absolute;
        top: 0;
        left: 50%;
        z-index: 3;
        width: 76px;
        height: 34px;
        transform: translateX(-50%);
      }

      .gift-bow::before,
      .gift-bow::after {
        content: "";
        position: absolute;
        top: 5px;
        width: 34px;
        height: 24px;
        border-radius: 999px 999px 8px 999px;
        background: #ff7d9c;
      }

      .gift-bow::before {
        left: 2px;
        transform: rotate(24deg);
      }

      .gift-bow::after {
        right: 2px;
        transform: scaleX(-1) rotate(24deg);
      }

      .secret-card strong {
        display: block;
        margin-top: 8px;
        color: var(--blue-dark);
        font-size: clamp(2rem, 5vw, 3.5rem);
        line-height: 1.1;
      }

      .secret-card span {
        color: var(--muted);
        font-weight: 800;
      }

      .message {
        min-height: 24px;
        margin: 0;
      }

      .message.error {
        color: #b42318;
        font-weight: 800;
      }

      .pair-list {
        display: grid;
        gap: 8px;
        margin-top: 14px;
      }

      .pair-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
        gap: 10px;
        align-items: center;
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 10px 12px;
        background: #ffffff;
      }

      .pair-row b {
        min-width: 0;
        overflow-wrap: anywhere;
      }

      .pair-row span {
        color: var(--mint);
        font-weight: 900;
      }

      .hidden {
        display: none;
      }

      @media (max-width: 860px) {
        .hero,
        .workspace {
          grid-template-columns: 1fr;
        }

        .status-panel {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 560px) {
        .page {
          width: min(100% - 22px, 1120px);
          padding-top: 18px;
        }

        .title-panel,
        .input-panel,
        .result-panel,
        .status-panel {
          border-radius: 14px;
          padding: 16px;
        }

        .status-panel,
        .result-tools {
          grid-template-columns: 1fr;
        }

        .pair-row {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="hero" aria-label="마니또 뽑기 소개">
        <div class="title-panel">
          <p class="eyebrow">CLASSROOM RANDOM MATCH</p>
          <h1>마니또 뽑기</h1>
          <p class="lead">
            이름을 넣고 뽑기 버튼을 누르면 자기 자신을 제외하고 서로의 마니또가 정해집니다.
            결과는 한 명씩 확인할 수 있어 교실에서 바로 쓰기 좋습니다.
          </p>
        </div>
        <aside class="status-panel" aria-label="현재 상태">
          <div class="stat">
            <span>참여 인원</span>
            <strong id="nameCount">0</strong>
          </div>
          <div class="stat">
            <span>배정 상태</span>
            <strong id="drawState">대기</strong>
          </div>
        </aside>
      </section>

      <section class="workspace">
        <div class="input-panel">
          <div class="panel-header">
            <div>
              <h2>이름 입력</h2>
              <p class="hint">한 줄에 한 명씩 입력하거나 쉼표로 구분하세요.</p>
            </div>
          </div>
          <textarea id="nameInput" aria-label="학생 이름 입력">김민준
이서연
박지후
최하윤
정도윤
한유진</textarea>
          <div class="actions">
            <button class="button" id="drawButton" type="button">마니또 뽑기</button>
            <button class="button secondary" id="sampleButton" type="button">예시 이름 넣기</button>
            <button class="button ghost" id="clearButton" type="button">비우기</button>
          </div>
        </div>

        <div class="result-panel">
          <div class="panel-header">
            <div>
              <h2>결과 확인</h2>
              <p class="hint">학생을 선택한 뒤 개별 확인을 누르면 그 학생의 마니또만 보입니다.</p>
            </div>
          </div>
          <div class="result-tools">
            <select id="studentSelect" aria-label="결과를 확인할 학생 선택">
              <option value="">먼저 마니또를 뽑아 주세요</option>
            </select>
            <button class="button secondary" id="revealButton" type="button">개별 확인</button>
          </div>
          <div class="secret-card" aria-live="polite">
            <div>
              <span id="secretLabel">아직 결과가 없습니다</span>
              <button class="gift-button hidden" id="giftButton" type="button" aria-label="선물상자를 열어 마니또 확인하기">
                <span class="gift-box" aria-hidden="true">
                  <span class="gift-bow"></span>
                  <span class="gift-lid"></span>
                  <span class="gift-body"></span>
                </span>
                <span>선물상자를 눌러 열어 보세요</span>
              </button>
              <strong id="secretName">?</strong>
            </div>
          </div>
          <p class="message" id="message"></p>
          <div class="actions">
            <button class="button ghost" id="toggleAllButton" type="button">전체 결과 보기</button>
            <button class="button ghost" id="copyButton" type="button">결과 복사</button>
          </div>
          <div class="pair-list hidden" id="pairList" aria-label="전체 마니또 배정 결과"></div>
        </div>
      </section>
    </main>

    <script>
      const input = document.querySelector("#nameInput");
      const nameCount = document.querySelector("#nameCount");
      const drawState = document.querySelector("#drawState");
      const studentSelect = document.querySelector("#studentSelect");
      const secretLabel = document.querySelector("#secretLabel");
      const giftButton = document.querySelector("#giftButton");
      const secretName = document.querySelector("#secretName");
      const message = document.querySelector("#message");
      const pairList = document.querySelector("#pairList");
      const drawButton = document.querySelector("#drawButton");
      const sampleButton = document.querySelector("#sampleButton");
      const clearButton = document.querySelector("#clearButton");
      const revealButton = document.querySelector("#revealButton");
      const toggleAllButton = document.querySelector("#toggleAllButton");
      const copyButton = document.querySelector("#copyButton");

      const sampleNames = ["김민준", "이서연", "박지후", "최하윤", "정도윤", "한유진"];
      let pairs = new Map();
      let pendingRevealStudent = "";

      function parseNames(value) {
        const seen = new Set();
        return value
          .split(/[\n,]+/)
          .map((name) => name.trim())
          .filter(Boolean)
          .filter((name) => {
            const key = name.toLocaleLowerCase("ko-KR");
            if (seen.has(key)) return false;
            seen.add(key);
            return true;
          });
      }

      function shuffle(items) {
        const result = [...items];
        for (let index = result.length - 1; index > 0; index -= 1) {
          const swapIndex = Math.floor(Math.random() * (index + 1));
          [result[index], result[swapIndex]] = [result[swapIndex], result[index]];
        }
        return result;
      }

      function makeDerangement(names) {
        if (names.length < 2) return null;
        for (let attempt = 0; attempt < 200; attempt += 1) {
          const shuffled = shuffle(names);
          if (shuffled.every((name, index) => name !== names[index])) return shuffled;
        }
        return names.slice(1).concat(names[0]);
      }

      function setMessage(text, isError = false) {
        message.textContent = text;
        message.classList.toggle("error", isError);
      }

      function updateCount() {
        nameCount.textContent = String(parseNames(input.value).length);
      }

      function resetResult() {
        pairs = new Map();
        pendingRevealStudent = "";
        drawState.textContent = "대기";
        studentSelect.innerHTML = '<option value="">먼저 마니또를 뽑아 주세요</option>';
        secretLabel.textContent = "아직 결과가 없습니다";
        giftButton.classList.add("hidden");
        secretName.textContent = "?";
        pairList.innerHTML = "";
        pairList.classList.add("hidden");
        toggleAllButton.textContent = "전체 결과 보기";
      }

      function renderPairs(names) {
        studentSelect.innerHTML = '<option value="">학생 선택</option>';
        names.forEach((name) => {
          const option = document.createElement("option");
          option.value = name;
          option.textContent = name;
          studentSelect.append(option);
        });

        pairList.innerHTML = "";
        names.forEach((name) => {
          const row = document.createElement("div");
          row.className = "pair-row";
          row.innerHTML = "<b></b><span>→</span><b></b>";
          row.children[0].textContent = name;
          row.children[2].textContent = pairs.get(name);
          pairList.append(row);
        });
      }

      function drawManitto() {
        const names = parseNames(input.value);
        updateCount();
        resetResult();

        if (names.length < 2) {
          setMessage("마니또를 뽑으려면 이름이 2명 이상 필요합니다.", true);
          return;
        }

        const targets = makeDerangement(names);
        names.forEach((name, index) => pairs.set(name, targets[index]));
        renderPairs(names);
        drawState.textContent = "완료";
        setMessage("마니또 배정이 완료되었습니다. 학생을 선택해 한 명씩 확인하세요.");
      }

      function revealSelected() {
        const student = studentSelect.value;
        if (!student || !pairs.has(student)) {
          setMessage("결과를 확인할 학생을 먼저 선택하세요.", true);
          return;
        }
        pendingRevealStudent = student;
        secretLabel.textContent = `${student}의 선물상자`;
        giftButton.classList.remove("hidden");
        secretName.textContent = "";
        setMessage("학생이 직접 선물상자를 눌러 마니또를 확인하게 해 주세요.");
      }

      function openGift() {
        if (!pendingRevealStudent || !pairs.has(pendingRevealStudent)) {
          setMessage("먼저 학생을 선택하고 개별 확인을 눌러 주세요.", true);
          return;
        }
        secretLabel.textContent = `${pendingRevealStudent}의 마니또`;
        giftButton.classList.add("hidden");
        secretName.textContent = pairs.get(pendingRevealStudent);
        pendingRevealStudent = "";
        setMessage("다음 학생이 보기 전에 이름을 다시 선택해 주세요.");
      }

      function toggleAll() {
        if (pairs.size === 0) {
          setMessage("전체 결과를 보려면 먼저 마니또를 뽑아 주세요.", true);
          return;
        }
        const hidden = pairList.classList.toggle("hidden");
        toggleAllButton.textContent = hidden ? "전체 결과 보기" : "전체 결과 숨기기";
      }

      async function copyResult() {
        if (pairs.size === 0) {
          setMessage("복사할 결과가 없습니다. 먼저 마니또를 뽑아 주세요.", true);
          return;
        }
        const text = [...pairs.entries()].map(([from, to]) => `${from} -> ${to}`).join("\n");
        try {
          await navigator.clipboard.writeText(text);
          setMessage("결과를 클립보드에 복사했습니다.");
        } catch {
          setMessage("이 브라우저에서는 자동 복사가 막혀 있습니다. 전체 결과를 열어 직접 복사해 주세요.", true);
        }
      }

      input.addEventListener("input", () => {
        updateCount();
        resetResult();
        setMessage("");
      });
      drawButton.addEventListener("click", drawManitto);
      revealButton.addEventListener("click", revealSelected);
      giftButton.addEventListener("click", openGift);
      studentSelect.addEventListener("change", () => {
        pendingRevealStudent = "";
        giftButton.classList.add("hidden");
        secretLabel.textContent = pairs.size ? "개별 확인을 누르면 선물상자가 나옵니다" : "아직 결과가 없습니다";
        secretName.textContent = "?";
        setMessage("");
      });
      toggleAllButton.addEventListener("click", toggleAll);
      copyButton.addEventListener("click", copyResult);
      sampleButton.addEventListener("click", () => {
        input.value = sampleNames.join("\n");
        updateCount();
        resetResult();
        setMessage("예시 이름을 넣었습니다. 필요에 맞게 바꾼 뒤 뽑아 주세요.");
      });
      clearButton.addEventListener("click", () => {
        input.value = "";
        updateCount();
        resetResult();
        setMessage("이름 입력칸을 비웠습니다.");
      });

      updateCount();
    </script>
  </body>
</html>
